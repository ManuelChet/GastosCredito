<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculadora de Gastos de Crédito</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- Estilos -->
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

  <!-- =============================
       HEADER
  ============================== -->
  <header class="topbar">
    <div class="logo">
      <i class="fas fa-landmark"></i>
      COLUA
    </div>
    <div class="status">
      <span class="dot"></span>
      Sistema Activo
    </div>
  </header>


  <!-- =============================
       CONTENEDOR DE ALERTAS
  ============================== -->
  <div id="alertContainer" class="alert-container"></div>


  <!-- =============================
       CONTENEDOR PRINCIPAL
  ============================== -->
  <main class="container">

    <div class="card">

      <div class="card-header">
        <div class="icon-box">
          <i class="fas fa-calculator"></i>
        </div>
        <div>
          <h2>Calculadora de Gastos</h2>
          <p>Calcula los gastos de tu crédito</p>
        </div>
      </div>


      <!-- =============================
           MONTO
      ============================== -->
      <div class="form-group">
        <label for="monto">
          <i class="fas fa-money-bill-wave"></i> Monto del Crédito
        </label>
        <input 
          type="text" 
          id="monto" 
          placeholder="Q 0.00" 
          autocomplete="off"
        >
      </div>


      <!-- =============================
           TIPO DE GARANTÍA
      ============================== -->
      <div class="form-group">
        <label for="tipoGarantia">
          <i class="fas fa-shield-alt"></i> Tipo de Garantía
        </label>
        <select id="tipoGarantia">
          <option value="">Seleccione el tipo de garantía</option>
          <option value="fiduciario">Fiduciario</option>
          <option value="automatico">Automático</option>
          <option value="hipotecario">Hipotecario</option>
          <option value="derechos_posesorios">Derechos Posesorios</option>
          <option value="fondo_retiro">Fondo de Retiro</option>
          <option value="credito_seguro_columna">Crédito con Seguro Columna</option>
          <option value="microcredito">Microcrédito</option>
        </select>
      </div>


      <!-- =============================
           ESCRITURA (HIPOTECARIO)
      ============================== -->
      <div id="opcionesEscritura" class="form-group hidden">
        <label for="tipoEscritura">
          <i class="fas fa-file-contract"></i> Tipo de Escritura
        </label>
        <select id="tipoEscritura">
          <option value="">Seleccione</option>
          <option value="registrada">Escritura Registrada</option>
          <option value="publica">Escritura Pública</option>
        </select>
      </div>


      <!-- =============================
           CANTIDAD DE ESCRITURAS (HIPOTECARIO)
      ============================== -->
      <div id="cantidadEscriturasHipotecarioContainer" class="form-group hidden">
        <label for="cantidadEscriturasHipotecario">
          <i class="fas fa-copy"></i> Cantidad de Escrituras Utilizadas
        </label>
        <input 
          type="number" 
          id="cantidadEscriturasHipotecario" 
          placeholder="Ingrese cantidad"
          min="1"
          autocomplete="off"
        >
      </div>


      <!-- =============================
           UBICACIÓN AVALÚO (>400,000)
      ============================== -->
      <div id="ubicacionAvaluoContainer" class="form-group hidden">
        <label for="ubicacionAvaluo">
          <i class="fas fa-map-marker-alt"></i> Ubicación del Avalúo
        </label>
        <select id="ubicacionAvaluo">
          <option value="">Seleccione</option>
          <option value="solola">En Sololá (Q 1,000.00)</option>
          <option value="fuera">Fuera de Sololá (Q 1,500.00)</option>
        </select>
      </div>


      <!-- =============================
           ESCRITURA (DERECHOS POSESORIOS)
      ============================== -->
      <div id="opcionesEscrituraDP" class="form-group hidden">
        <label for="tipoEscrituraDP">
          <i class="fas fa-file-contract"></i> Tipo de Escritura
        </label>
        <select id="tipoEscrituraDP">
          <option value="">Seleccione</option>
          <option value="registrada">Escritura Registrada</option>
          <option value="publica">Escritura Pública</option>
        </select>
      </div>


      <!-- =============================
           CANTIDAD DE ESCRITURAS (DERECHOS POSESORIOS)
      ============================== -->
      <div id="cantidadEscriturasContainer" class="form-group hidden">
        <label for="cantidadEscrituras">
          <i class="fas fa-copy"></i> Cantidad de Escrituras Utilizadas
        </label>
        <input 
          type="number" 
          id="cantidadEscrituras" 
          placeholder="Ingrese cantidad"
          min="1"
          autocomplete="off"
        >
      </div>


      <!-- =============================
           UBICACIÓN DERECHOS POSESORIOS (>500,000)
      ============================== -->
      <div id="ubicacionDPContainer" class="form-group hidden">
        <label for="ubicacionDP">
          <i class="fas fa-map-marker-alt"></i> Ubicación del Crédito
        </label>
        <select id="ubicacionDP">
          <option value="">Seleccione</option>
          <option value="solola">En el departamento de Sololá</option>
          <option value="fuera">Fuera del departamento de Sololá</option>
        </select>
      </div>


      <!-- =============================
           BOTONES
      ============================== -->
      <div class="button-group">
        <button id="btnCalcular" class="btn-primary">
          <i class="fas fa-calculator"></i> Calcular Gastos
        </button>

        <div class="button-row">
          <button id="btnLimpiar" class="btn-clear">
            <i class="fas fa-eraser"></i> Limpiar
          </button>

          <button id="btnImprimir" class="btn-secondary">
            <i class="fas fa-print"></i> Imprimir
          </button>
        </div>
      </div>

    </div>


    <!-- =============================
         RESULTADOS
    ============================== -->
    <div id="resultado" class="result-card hidden"></div>

  </main>


  <!-- =============================
       FOOTER
  ============================== -->
  <footer class="footer">
    <div class="footer-content">
      <p class="footer-main">
        <i class="fas fa-cog footer-icon"></i>
        Sistema Interno de Cálculo de Gastos v2.0
      </p>
      <p class="footer-secondary">
        &copy; <span id="anioActual"></span> COLUA · 
        Desarrollado por Manuel Adrián Chet Samayoa · 
        Gastos generados según políticas vigentes
      </p>
    </div>
  </footer>


  <!-- =============================
       SCRIPTS
  ============================== -->
  <script src="js/app.js"></script>

</body>
</html>
